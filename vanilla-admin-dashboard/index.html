<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Image Manager</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Using Phosphor Icons for clean dashboard icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <i class="ph ph-storefront"></i>
                <h2>SmartBiz Admin</h2>
            </div>
            <nav>
                <a href="#" class="active"><i class="ph ph-image"></i> Media Library</a>
                <a href="#"><i class="ph ph-chart-bar"></i> Analytics</a>
                <a href="#"><i class="ph ph-gear"></i> Settings</a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>Media Library</h1>
                <p>Manage your portfolio and gallery images. Changes are saved locally.</p>
            </header>

            <!-- Upload Area -->
            <div class="upload-section">
                <div class="drop-zone" id="dropZone">
                    <i class="ph ph-upload-simple"></i>
                    <h3>Drag & drop images here</h3>
                    <p>or click to browse from your device</p>
                    <input type="file" id="fileInput" accept="image/*" multiple hidden>
                    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">Select Files</button>
                    <p class="file-limits">Supports JPG, PNG, GIF (Max 5MB)</p>
                </div>
            </div>

            <!-- Gallery Area -->
            <div class="gallery-section">
                <div class="gallery-header">
                    <h2>Uploaded Images (<span id="imageCount">0</span>)</h2>
                </div>
                <div class="gallery-grid" id="galleryGrid">
                    <!-- Images will be injected here by JavaScript -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
